<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .avatar{
		 width:100px;
		 height:100px;
		 border-radius:50%;
		 background:#333;
		 color:white;
		 display:flex;
		 align-items:center;
		 justify-content:center;
		 font-weight:bold;
		 margin: 0 auto;
		 font-size: 30px;
		 letter-spacing: 2px;
		}
    </style>
</head>
<body>

	<div class="container mt-5 mb-5">
		<div class="mt-4 mb-4 text-center">
			<h1>Create Dynamic User Avatar with Initials in JavaScript</h1>
		</div>

		<div class="row justify-content-center mt-5 mb-5" id="avatar"></div>


   <div class="container mt-5">

<h1 class="text-center mb-4">Live Character Counter</h1>

<textarea id="textInput" class="form-control" rows="5" 
placeholder="Start typing here..."></textarea>

<div class="mt-3">
   <p>Characters: <span id="charCount">0</span></p>
   <p>Words: <span id="wordCount">0</span></p>
</div>

</div>

	</div>

	<script>
		
		const getUserNameinitial = name =>{
        
          const initial = name.split(" ")
                          .map(word => word.charAt(0).toUpperCase())
                          .join("");
                return initial;

		};

		const capitalize = name =>{

			const bigName = name.split(" ")
			                .map(word => word[0].toUpperCase() + word.slice(1)).join(" ");
			      return bigName;
		};

		const str = "prabhat kumar pandit";
		const sp = str.split(" ");
		console.log(sp);

		const jn = sp.join(" ");
		console.log(jn);

		const name = "pooja kumari jha";

		console.log(getUserNameinitial(name));

		const nameArray = ['prabhat pandit', 'pooja kumari jha', 'deepak sharma', 'pankaj kumar sharma'];

		const names = document.querySelector("#avatar");

              names.innerHTML =  nameArray.map(name => `

              	<div class="col-lg-3 text-center col-sm-12">
                 <div class="avatar">${getUserNameinitial(name)}</div>
              	 <p class="h4 mt-3 mb-3">${capitalize(name)}</p>
              	</div>
              `).join("");



   const textInput = document.querySelector("#textInput");
   const charCount = document.querySelector("#charCount");
   const wordCount = document.querySelector("#wordCount");

   textInput.addEventListener("input", function(){

   const text = this.value;

   // Character count
   charCount.innerText = text.replace(/\s/g,"").length;

   // Word count
   // agar word empty nahi hai toh rakho, agar empty hai toh hata do
   const words = text.trim().split(/\s+/).filter(word => word.length > 0);
   wordCount.innerText = words.length;

  });


	</script>
