<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Product Page</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .product-img{
		height:200px;
		object-fit:contain;
		padding:10px;
		width: 100%;
      }
    </style>
</head>
<body>


	<div class="container mt-4 mb-4">
		
        <h1 class="h1 mt-5 mb-5 text-center">Build a Dynamic Product Page Using JavaScript</h1>

	   	<h2 class="mb-4">Search Products by Name & Brand</h2>

		<input 
		type="search" 
		class="form-control mb-4" 
		placeholder="Search products..."
		id="searchProduct"
		>
       <div class="row justify-content-center" id="products"></div>

       <h4 class="text-start mb-3">
         Cart 🛒 <span id="cartCount">0</span>
       </h4>

       <div id="cartItems" class="row mt-5"></div>

	</div>

	<script>
		
	const products = [

		{
		id:1,
		name:"Wireless Bluetooth Headphones",
		price:1999,
		brand:"Sony",
		rating:4.5,
		image:"https://m.media-amazon.com/images/I/61CGHv6kmWL._SX522_.jpg"
		},

		{
		id:2,
		name:"Smart Watch",
		price:2499,
		brand:"Boat",
		rating:4.2,
		image:"https://m.media-amazon.com/images/I/61ZjlBOp+rL._SX522_.jpg"
		},

		{
		id:3,
		name:"Gaming Mouse",
		price:899,
		brand:"Logitech",
		rating:4.6,
		image:"https://m.media-amazon.com/images/I/61mpMH5TzkL._SX522_.jpg"
		},

		{
		id:4,
		name:"Mechanical Keyboard",
		price:3499,
		brand:"Redragon",
		rating:4.7,
		image:"https://m.media-amazon.com/images/I/71kr3WAj1FL._SX522_.jpg"
		},

		{
		id:5,
		name:"Running Shoes",
		price:2999,
		brand:"Nike",
		rating:4.4,
		image:"https://m.media-amazon.com/images/I/61XwYMOyfwL._AC_UL320_.jpg"
		},

		{
		id:6,
		name:"Men's Casual T-Shirt",
		price:799,
		brand:"Puma",
		rating:4.1,
		image:"https://m.media-amazon.com/images/I/713n+TxyfCL._SX569_.jpg"
		},

		{
		id:7,
		name:"Laptop Backpack",
		price:1499,
		brand:"Skybags",
		rating:4.3,
		image:"https://m.media-amazon.com/images/I/51yfw2JIxwL._SX679_.jpg"
		},

		{
		id:8,
		name:"Portable Bluetooth Speaker",
		price:1799,
		brand:"JBL",
		rating:4.5,
		image:"https://m.media-amazon.com/images/I/51-0UzU7-DL._SX522_.jpg"
		},

		{
		id:9,
		name:"Smartphone Tripod Stand",
		price:599,
		brand:"Digitek",
		rating:4.0,
		image:"https://m.media-amazon.com/images/I/71a37NaevuL._SX679_.jpg"
		},

		{
		id:10,
		name:"LED Desk Lamp",
		price:999,
		brand:"Philips",
		rating:4.3,
		image:"https://m.media-amazon.com/images/I/61dmqocm9qL._SL1280_.jpg"
		},
		{
		id:11,
		name:"External SSD 1TB",
		price:7999,
		brand:"Samsung",
		rating:4.3,
		image:"https://m.media-amazon.com/images/I/81RiwhBz2DL._SX679_.jpg"
		},

		{
		id:12,
		name:"Wireless Gaming Controller",
		price:2599,
		brand:"Xbox",
		rating:4.3,
		image:"https://m.media-amazon.com/images/I/51r0ELMxhtL.jpg"
		},

   ];


const container = document.querySelector("#products");

 const displayProducts = data => {

	if(data.length === 0){
		container.innerHTML = `
		<div class="col-12 text-center mt-5">
		   <img src="https://cdn-icons-png.flaticon.com/512/2748/2748558.png" width="80">
		   <h4 class="mt-3 text-muted">No Product Found</h4>
           <p>Try searching another product</p>
        </div>
		`;

		return;
    }

	container.innerHTML = data.map(product => `

		<div class="col-lg-3 col-md-4 col-sm-6 mb-4">

		<div class="card h-100 shadow-sm">

		<img src="${product.image}" class="card-img-top product-img">

		<div class="card-body">

		<h5 class="card-title">${product.name}</h5>

		<p class="text-muted">${product.brand}</p>

		<p>⭐ ${product.rating}</p>

		<h6 class="text-primary">₹ ${product.price}</h6>

		<button onclick="addToCart(${product.id})" class="btn btn-dark w-100">
         Add To Cart
        </button>

		</div>

		</div>

		</div>

		`).join("");
    }

displayProducts(products);


 const searchInput = document.querySelector("#searchProduct");

 searchInput.addEventListener("input", function(){

 	const searchValue = this.value.toLowerCase();

    if(searchValue === ""){
      displayProducts(products);
      return;
    }

    const filteredProducts = products.filter(product => product.name.toLowerCase().includes(searchValue) || product.brand.toLowerCase().includes(searchValue));
    
 	displayProducts(filteredProducts);

 });


let cart = [];

function addToCart(id){

 const product = products.find(p => p.id === id);

 const alreadyInCart = cart.some(item => item.id === id);

 if(!alreadyInCart){
  cart.push(product);
 }

 document.querySelector("#cartCount").innerText = cart.length;

 displayCart();

}

function displayCart(){

 document.querySelector("#cartItems").innerHTML = cart.map(cartItem => `

 <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
	<div class="card h-100 shadow-sm">

	<img src="${cartItem.image}" class="card-img-top product-img">

	<div class="card-body">

	<h5 class="card-title">${cartItem.name}</h5>

	<p class="text-muted">${cartItem.brand}</p>

	<p>⭐ ${cartItem.rating}</p>

	<h6 class="text-primary">₹ ${cartItem.price}</h6>

	<button onclick="removeFromCart(${cartItem.id})" class="btn btn-dark w-100">
	Remove From Cart
	</button>

	</div>

	</div>
 </div>

 `).join("");

}

function removeFromCart(id){

 cart = cart.filter(item => item.id !== id);

 document.querySelector("#cartCount").innerText = cart.length;

 displayCart();

}


	</script>

</body>
</html>
