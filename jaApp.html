<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Learn javaScript With Er. Prabhat Pandit</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
	  body{
	  	background: #fff;
	  }
	 *{
	 	  padding: 0;
	 	  margin: 0;
	  }
    .card {
     transition: 0.3s;
     }
    .card:hover {
      transform: scale(1.05);
      cursor: pointer;
    }
    .animation{
    	animation-name: prabhat;
    	animation-duration: 0.3s;
    	animation-delay: 0;
    	animation-direction: alternate;
    	animation-iteration-count: infinite;
    	transition: all 0.3s ease;
    }
    @keyframes prabhat{

    	0%{
    		transform: scale(1.0);
    		transition: all 0.3s ease;
    	}
    	50%{
    		transform: scale(0.6);
    		transition: all 0.3s ease;
    	}
    	100%{
    		transform: scale(1.5);
    		transition: all 0.3s ease;
    	}
    }
	</style>
</head>
<body>


	<div class="container">
		
		<div class="text-center mt-5 mb-5">
			<h1>DOM Manipulation + Event Handling in JavaScript: Beginners To Pro</h1>
		</div>


		<div id="row"></div>


		<div class="modal fade" tabindex="-1" id="myModal">
		  <div class="modal-dialog">
		    <div class="modal-content">
		      <div class="modal-header">
		        <h5 class="modal-title">Modal title</h5>
		        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
		      </div>
		      <div class="modal-body">
		        <p>Modal body text goes here.</p>
		      </div>
		      <div class="modal-footer">
		        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
		      </div>
		    </div>
		  </div>
        </div>

	</div>

	<script>

        // array of objects
		const users = [

			{id:1, name:"Er. Prabhat Pandit", email:"prabhat@gamil.com", profile:"Software Developer"},
			{id:2, name:"Rahul", email:"rahul@gamil.com", profile:"UI Developer"},
			{id:3, name:"Pooja Kumari", email:"poojakr@gamil.com", profile:"Python Developer"},
			{id:4, name:"Payal", email:"payal@gamil.com", profile:"Business Developer"},
			{id:5, name:"Nehal", email:"nehal@gamil.com", profile:"MBA"},
			{id:6, name:"Ram Kumar", email:"ram@gamil.com", profile:"ServiceNow Developer"},
			{id:7, name:"Arjun", email:"arjun@gamil.com", profile:"Wordpress Developer"},
			{id:8, name:"Pankaj Sharma", email:"pankaj@gamil.com", profile:"Frontend Developer"},
			{id:9, name:"Deepak Sharma", email:"deepak@gamil.com", profile:"Software Developer"},
			{id:10, name:"Vikas", email:"vikas@gamil.com", profile:"UI Developer"},
		];


		const userLists = document.querySelector("#row");

		const div = document.createElement("div");
		            div.classList.add("row","myclass","justify-content-center", "mt-3", "mb-3");
		            div.id = "myId";

		      userLists.appendChild(div);  

		users.forEach((u) =>{
           
            const col = document.createElement("div");
                        col.classList.add("col-sm-3","mt-3", "mb-3");

            const card = document.createElement("div");
                         card.classList.add("card","bg-info", "prabhat-class");


                  card.innerHTML = `

                       <img class="card-img-top" alt="${u.name}" src="https://randomuser.me/api/portraits/men/${Math.floor(Math.random()*50)}.jpg">  

                  	   <div class="card-body">
                          <h4 class="card-title">Name: ${u.name}</h4>
                  	      <p class="card-text">Email: ${u.email}</p>
                  	      <p class="card-text">Profile:${u.profile}</p>
                  	      <button class="btn btn-warning btn-click">Know More</button>
                  	      <button class="btn btn-like">❤️</button>
                  	      <button class="btn btn-danger">Delete</button>
                  	   </div>

                  `;


           card.querySelector(".btn-click").addEventListener("click", (e) =>{
           	 e.stopPropagation();
           	 showModal(u);
           });


           card.querySelector(".btn-danger").addEventListener("click", (e) =>{
           	 e.stopPropagation();
           	 col.remove();
           });

           card.querySelector(".btn-like").addEventListener("click", (e) =>{
           	 e.stopPropagation();
           	 e.target.classList.toggle("animation");
           });




            col.appendChild(card);
            div.appendChild(col);


		});


		function showModal(u){
			// alert(u.name);

			document.querySelector(".modal-title").innerText = u.name;
			document.querySelector(".modal-body").innerHTML = `

				<p class="card-text">Name: ${u.name}</p>
				<p class="card-text">Email: ${u.email}</p>
				<p class="card-text">Profile: ${u.profile}</p>
			`;


			const myModal = new bootstrap.Modal(document.getElementById('myModal'));

			myModal.show();
		}
		
	</script>

</body>
</html>
