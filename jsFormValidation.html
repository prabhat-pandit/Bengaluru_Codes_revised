<script>

    document.addEventListener("DOMContentLoaded", function() {

  const taskObject = [];
  const taskData = document.querySelector("#taskDiv");
  const btn = document.querySelector("#taskButton");
  const inputValue = document.querySelector("#todoItems");

  // -------------------------
  // Add Task Function
  // -------------------------
  function addTask() {
    const inputData = inputValue.value.trim();

    if(inputData === "" || !isNaN(inputData) || inputData.length < 3){
      alert("Please enter valid text Task");
      return;
    }

    // Add task object
    taskObject.push({
      id: Date.now(),
      task: inputData
    });

    inputValue.value = ""; // Clear input
    renderTask();
  }

  // -------------------------
  // Render Task Function
  // -------------------------
  function renderTask() {
    let html = "";

    taskObject.forEach(item => {
      html += `
        <ul class="list-group">
          <li class="list-group-item" data-id="${item.id}">
            ${item.task} 
            <button class="btn btn-info btn-sm" data-id="${item.id}">View</button>
            <button class="btn btn-danger btn-sm delete-btn" data-id="${item.id}">Delete</button>
          </li>
        </ul>
      `;
    });

    taskData.innerHTML = html;
  }

  // -------------------------
  // Delete Task Function
  // -------------------------
  function deleteTask(id) {
    const index = taskObject.findIndex(item => item.id === id);
    if(index !== -1){
      taskObject.splice(index, 1);
      renderTask();
    }
  }

  // -------------------------
  // Alert Task Function
  // -------------------------
  function alertTask(id) {
    const selectedTask = taskObject.find(item => item.id === id);
    if(selectedTask){
      alert(selectedTask.task);
    }
  }

  // -------------------------
  // Event Listeners
  // -------------------------
  btn.addEventListener("click", addTask);

  taskData.addEventListener("click", function(e){
    const id = Number(e.target.dataset.id);


    if(e.target.classList.contains("delete-btn")){
      deleteTask(id);
    } 
    else if(e.target.classList.contains("btn-info")){
      alertTask(id);
    }
  });


  document.addEventListener("keydown", (e) =>{

    if(e.key === "Enter" && document.activeElement === inputValue){
        addTask();
    }

  });

});
    


</script>

<script>
    
    document.addEventListener("DOMContentLoaded", () => {
    const form = document.querySelector("#signupForm");

    const fields = {
        name: document.querySelector("#name"),
        email: document.querySelector("#email"),
        password: document.querySelector("#password"),
        confirmPassword: document.querySelector("#confirmPassword"),
        phone: document.querySelector("#phone"),
    };

    const errors = {
        name: document.querySelector("#nameError"),
        email: document.querySelector("#emailError"),
        password: document.querySelector("#passwordError"),
        confirmPassword: document.querySelector("#confirmPasswordError"),
        formMessage: document.querySelector("#formMessage"),
        phone: document.querySelector("#phoneError")
    };

    function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    }

    function validateForm() {
        let isValid = true; // flag variable // assume karo form initially valid hai

        // Clear previous errors
        Object.values(errors).forEach(e => e.textContent = "");

        // Name validation
        if(fields.name.value.trim() === "") {
            errors.name.textContent = "Name is required";
            isValid = false;
        } else if(fields.name.value.trim().length < 3) {
            errors.name.textContent = "Name must be at least 3 characters";
            isValid = false;
        }

        // Email validation
        if(fields.email.value.trim() === "") {
            errors.email.textContent = "Email is required";
            isValid = false;
        // } else if(!validateEmail(fields.email.value.trim())) {
            errors.email.textContent = "Invalid email address";
            isValid = false;
        }

        // Password validation
        if(fields.password.value === "") {
            errors.password.textContent = "Password is required";
            isValid = false;
        } else if(fields.password.value.length < 6) {
            errors.password.textContent = "Password must be at least 6 characters";
            isValid = false;
        }

        // Confirm Password validation
        if(fields.confirmPassword.value === "") {
            errors.confirmPassword.textContent = "Please confirm your password";
            isValid = false;
        } else if(fields.confirmPassword.value !== fields.password.value) {
            errors.confirmPassword.textContent = "Passwords do not match";
            isValid = false;
        }

        // Phone validation
        if(fields.phone.value.trim() === "") {
            errors.phone.textContent = "Phone number is required";
            isValid = false;
        } else if(!/^[6-9]\d{9}$/.test(fields.phone.value.trim())) {
            errors.phone.textContent = "Enter valid 10-digit phone number";
            isValid = false;
        }

        return isValid;
    }

    form.addEventListener("submit", (e) => {
        e.preventDefault();

         const formData = document.querySelector("#formData");
         console.log(fields.name.value);
         let html = "";
        if(validateForm()) {
            errors.formMessage.textContent = "Signup successful!";
            errors.formMessage.className = "success";

            Object.entries(fields).forEach(([key, field], index) => {
            html += `<div id="${index}" class="list-group">
                       <p class="${index % 2 === 0 ? "bg-info list-group-item" : "bg-success list-group-item"}">
                             <strong>${key.toUpperCase()}:</strong> ${field.value}
                        </p>
                     </div>`;
            });

            formData.innerHTML = html;
            // form.reset();

        } else {
            errors.formMessage.textContent = "Please fix the errors above";
            errors.formMessage.className = "error";
        }
    });
});

</script>
