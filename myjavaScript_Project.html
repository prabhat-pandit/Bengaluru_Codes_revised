<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
     .card-title{
     	font-size: 17px;
     }
     .card{
     	transform: translateY(0px);
     	transition: all 0.3s ease;
     }
     .card:hover{
     	transform: translateY(-15px);
     	transition: all 0.3s ease;
     }
    </style>
</head>
<body>

	<div class="container mt-4 mb-4">
		
		<button id="seven" class="btn btn-dark btn-sm">Retry Again</button>
		<div class="row justify-content-center" id="dataRender"></div>
		<div class="error" id="error"></div>

	</div>

	<script>
		
		document.addEventListener("DOMContentLoaded", function(){

		let btn = document.querySelector("#seven");
		let errorText = document.querySelector("#error");
		let dataRender = document.querySelector("#dataRender");

		let fetchUserData = () => {
                   btn.innerText = "Loading...";
                   errorText.innerText = "";
                   btn.setAttribute("disabled", true);
			       fetch(`https://jsonplaceholder.typicode.com/users`)
			       .then(response => {
			       	if(!response.ok) {
			       		throw new Error("Network Not Working at This Moment");
			       	}
			 
			         console.log(response);
			         return response.json();

			       })
			       .then(data => {
			       	btn.innerText = "Retry Again";
			       	btn.removeAttribute("disabled");
			       	errorText.innerText = "";
			       
			       	dataRender.innerHTML = data.map(user => `
                        
                        <div class="col-lg-3 text-left col-sm-12 col-xs-12 col-md-4">
                           <div class="card mt-3 mb-3">
                             <div class="card-body">
                             <h4 class="card-title">Name: ${user.name}</h4>
			       		     <p>User Name: ${user.username}</p>
			       		     <p>E-mail: ${user.email}</p>
			       		     <p>City: ${user?.address?.city}</p>
			       		     <p>Address: ${user?.address?.street}</p>
			       		     <p>Website: ${user.website}</p>
                            </div>
			       		   </div>
                        </div>

			       	`).join("");
			       })
			       .catch((error) =>{
			      	console.log(error.message);
			      	btn.innerText = "Retry Again";
			      	btn.removeAttribute("disabled");
			      	errorText.innerText = error.message;
			      });



		};

		fetchUserData();

		
		    btn.addEventListener("click", ()=>{
		    	fetchUserData();
		    });

	});

	</script>

</body>
</html>
