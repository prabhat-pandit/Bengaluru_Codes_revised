    <script>

     function calculateAge() {
    // Input fields ko get karen
    const birthdateInput = document.getElementById('birthdate');
    const resultDiv = document.getElementById('result');
    const ageDisplay = document.getElementById('ageDisplay');
    const errorDiv = document.getElementById('error');
    
    // Error aur result clear karen
    errorDiv.innerHTML = '';
    resultDiv.style.display = 'none';
    
    // Check karen ki date select ki gayi hai ya nahi
    if (!birthdateInput.value) {
        errorDiv.innerHTML = 'कृपया अपनी जन्म तिथि चुनें';
        return;
    }
    
    // Date objects create karen
    const birthDate = new Date(birthdateInput.value);
    const today = new Date();
    
    // Validate karen ki date valid hai ya nahi
    if (isNaN(birthDate.getTime())) {
        errorDiv.innerHTML = 'कृपया सही तिथि चुनें';
        return;
    }
    
    // Check karen ki birth date future ki toh nahi hai
    if (birthDate > today) {
        errorDiv.innerHTML = 'जन्म तिथि भविष्य में नहीं हो सकती';
        return;
    }
    
    // Age calculate karen
    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    let days = today.getDate() - birthDate.getDate();
    
    // Days negative hone par adjust karen
    if (days < 0) {
        months--;
        const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0); // year, month(zero based), day
        days += lastMonth.getDate();
    }
    
    // Months negative hone par adjust karen
    if (months < 0) {
        years--;
        months += 12;
    }
    
    // Final age display karen
    let ageText = '';
    
    if (years > 0) {
        ageText += years + ' वर्ष ';     // 01-03-2026 :  your age: 1 day. // 02-03-2026 
    }
    if (months > 0 || years > 0) {
        ageText += months + ' महीने ';
    }
    ageText += days + ' दिन';
    
    // Agar koi 1 se kam ho to bhi dikhaye
    if (years === 0 && months === 0 && days === 0) {
        ageText = 'आज ही का दिन है! जन्मदिन मुबारक हो! 🎉';
    }
    
    // Result show karen
    ageDisplay.innerHTML = ageText;
    resultDiv.style.display = 'block';
}

// Extra feature: Exact age in months and days bhi dikhaye
function getExactAge() {
    const birthdateInput = document.getElementById('birthdate');
    
    if (!birthdateInput.value) return;
    
    const birthDate = new Date(birthdateInput.value);
    const today = new Date();
    
    // Total days calculate karen
    const diffTime = Math.abs(today - birthDate);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    const totalMonths = Math.floor(diffDays / 30.44); // Average days in a month
    const remainingDays = Math.floor(diffDays % 30.44);
    
    console.log(`कुल दिन: ${diffDays} दिन`);
    console.log(`कुल महीने: ${totalMonths} महीने और ${remainingDays} दिन`);
}

// Enter key se bhi calculate kar sakte hain
document.getElementById('birthdate').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        calculateAge();
