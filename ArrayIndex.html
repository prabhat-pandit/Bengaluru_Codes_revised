<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Index in Array</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

   <div class="container">
   	
   	  <div class="text-center mt-5">
   	  	<h1>Check if Element Exists in Array (indexOf vs includes)</h1>
   	    <h1>Array Methods in JavaScript</h1>
   	  </div>

   </div>


<script>
     
     const students = ["ram", "shayam", "puja", "pooja", "riya", "sita", "moham", "sohan", "prabhat pandit"];

     console.log(students.indexOf("pooja")); // output 3

     const fruits = ["apple", "banana", "orange", "mango"];


      const index1 = fruits.indexOf("banana");
      if(index1 !== -1) {
        console.log("Element found at index....:", index1); // Output: Element found at index: 1
      }


     function findStudent(name){

        const index = students.indexOf(name);

        if(index === -1){

            return `${name} Class Mein Nahi hai`;
        }
        else{
            return `${name} Class Mein Present Hai and Roll No. ${index + 1} par hai ✅`;
        }
     }

     console.log(findStudent('ram'));

     const studentsArray = ["ram", "shayam", "puja", "pooja", "riya", "sita", "moham", "sohan", "prabhat pandit"];

     // Agar player nahi hai to -1
     console.log(studentsArray.indexOf("priya")); // output -1

     // Agar player nahi hai to -1
     console.log(studentsArray.indexOf("prabhat pandit")); // outpt 8, means student us array mein hai.

     // same result with includes() method. return "true" if element found in the given array
     console.log(studentsArray.includes("prabhat pandit")) // output "true" means student present hai array mein

     // same result with includes() method. return "false" if element not found in the given array
     console.log(studentsArray.includes("priya")) // output "false" means student present nahi hai array mein



     // indexOf() method -1 return karta hai agar element array mein nahi milta

    // Agar element milta hai, toh uski position/index return karta hai (0 se start)

    // index !== -1 ka matlab hai "agar index -1 ke barabar nahi hai" → matlab element mil gaya!


     // 1. Basic indexOf method (aapka wala)
		function checkElementBasic(arr, element) {
		    const index = arr.indexOf(element);
		    if(index !== -1) {
		        return { found: true, index: index, message: `Element found at index ${index}` };
		    }
		    return { found: false, index: -1, message: "Element not found" };
		}

       console.log(checkElementBasic(fruits, "apple"));



    function checkElementFind(arr, element) {
    const found = arr.find(item => item === element);
    if(found !== undefined) {
        console.log(`✅ Found: "${found}"`);
        return found;
    }
     console.log(`❌ Not found`);
     return null;
}

console.log(checkElementFind(fruits, "apple"));

 </script>

</body>
</html>
