<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    #percentage{
    	position: absolute;
	    background: black;
	    bottom: 7px;
	    padding: 10px;
	    border-radius: 20px;
	    color: #ffff;
	    font-size: 20px;
    }
    </style>
</head>
<body>

	<div class="container mt-5">

		<h1 class="text-center mb-4">Advanced Character Counter</h1>

		<textarea id="textInput" class="form-control" rows="5"
		placeholder="Start typing here..."></textarea>

		<div class="mt-3">

		<p>Characters: <span id="charCount">0</span></p>

		<p>Characters (without spaces): 
		<span id="charWithoutSpace">0</span></p>

		<p>Words: <span id="wordCount">0</span></p>

		</div>

		<div class="progress mt-3">
		  <div id="progressBar" class="progress-bar" style="width:0%"></div>
		  <span id="percentage"></span>
		</div>

		<p class="mt-2">Limit: 200 characters</p>

    </div>

    <script>
    	
     const textInput = document.querySelector("#textInput");
     const charCount = document.querySelector("#charCount");
     const charWithoutSpace = document.querySelector("#charWithoutSpace");
     const wordCount = document.querySelector("#wordCount");
     const progressBar = document.querySelector("#progressBar");

     const percentWidth = document.querySelector("#percentage");

const limit = 200;

textInput.addEventListener("input", function(){

   const text = this.value;

   // Character count
   const characters = text.length;
   charCount.innerText = characters;

   // Characters without spaces
   const noSpaces = text.replace(/\s/g,"").length;
   charWithoutSpace.innerText = noSpaces;

   // Word count
   // agar word empty nahi hai toh rakho, agar empty hai toh hata do
   const words = text.trim().split(/\s+/).filter(word => word.length > 0);
   wordCount.innerText = words.length;

   // Progress bar
   // (100 / 200) * 100, result = 50%,
   const percent = (characters / limit) * 100;
   progressBar.style.width = percent + "%"; // css width: 50%, Isliye progress bar 25% fill ho jayega.

   percentWidth.style.width = percent + "%";
   percentWidth.innerText = Math.round(percent) + "%";;

   // Color change
   if(characters > limit){
      progressBar.classList.remove("bg-success");
      progressBar.classList.add("bg-danger");
   }else{
      progressBar.classList.add("bg-success");
      progressBar.classList.remove("bg-danger");
   }

});

    </script>

</body>
</html>
