<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .avatar{
		 width:50px;
		 height:50px;
		 border-radius:50%;
		 background:#333;
		 color:white;
		 display:flex;
		 align-items:center;
		 justify-content:center;
		 font-weight:bold;
		 margin: 0 auto;
		}
    </style>
</head>
<body>

	<div class="container mt-5 mb-5">
		
		<div class="text-center mt-5 mb-5">
			<h1>Create Dynamic User Avatar with Initials in JavaScript</h1>
		</div>

		<div class="row" id="avatar"></div>

	</div>

	<script>
		const str = "prabhat kumar pandit";
		const sp = str.split(" ");
		console.log(sp);

		const jn = sp.join(" ");
		console.log(jn);

		const getUserInitial = name =>{
			 return name.split(" ").map(word => word[0].toUpperCase()).join("");
		};

		const capitalize = name => {

			const bigName = name.split(" ")
			                .map(word => word[0].toUpperCase() + word.slice(1)).join("");
			      return bigName;
		};

		const namesArray = ["prabhat", "prabhat pandit", "pooja kumari jha", "deepak sharma", "riya yadav", "pankaj sharma"];

		const names = document.querySelector("#avatar");
		      names.innerHTML = namesArray.map(name => `

		      	<div class="col-lg-2 col-sm-12 mt-4 mb-4 text-center">
                  <div class="avatar">${getUserInitial(name)}</div>
		      	  <p class="h4">${name}</p>
		      	</div>
		      `).join("");
		      
	</script>

</body>
