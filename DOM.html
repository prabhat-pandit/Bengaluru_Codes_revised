 users.forEach((u) =>{

  const col = document.createElement("div");  // Column creation, Second Div Creation
  col.classList.add("col-sm-3","mt-3", "mb-3");



  const card = document.createElement("div"); // Card div creation, Second Div Creation col>card
  card.classList.add("card", "bg-info");
  card.style.width="100%";

  card.innerHTML = `
                  
                  <img class="card-img-top" alt="${u.name}" src="https://randomuser.me/api/portraits/men/${Math.floor(Math.random()*50)}.jpg">

                    <p class="card-text">${u.profile}</p>
                    <a href="javascript:void(0)" class="btn btn-primary btn-click">Go somewhere</a>
                  </div>
              
    `;


  // 🔥 yahan object direct pass ho raha hai
  card.querySelector(".btn-click").addEventListener("click", (e) => {
    e.stopPropagation(); // 🔥 important
    ShowName(u);
    // alert(`Hello ${u.name}`);
  });

  col.appendChild(card); // Card ko "Column card" ke andar daalo. column div>Card div
  div.appendChild(col); // Ab last mein "Column Card ya Div" ko main Div ke andar daal do bas. simple

 });

 }

// 1: First Method using Map() method
// Har element pe function chalaata hai
// Map return a new array always.

const str = "PrabhatPandit";
const newArr = [...str].map((c) => c.toUpperCase());
console.log(newArr);


// 2: Second method using forEach() method
// Har element pe function chalaata hai
// kuch return nahi karta hai bhai yeh forEach method
// forEach method return nothing which meanns it returna "undefined"
// that's why I used here new variable to push all the elements in the new array then console that array

const NewArray = [];
[...str].forEach((c) =>{
  NewArray.push(c.toUpperCase());
});
console.log(NewArray);


function AddArrayElement(arrEle){

  let sum = 0;

  for(let i = 0; i < arrEle.length; i++){
     sum += arrEle[i];
  }
  return sum;
}

const TotalSum = AddArrayElement([2, 3, 4, 5, 6, 7, 8, 9, 10]);

const TotalSum1 = AddArrayElement([2, 3, 3, 2]);

console.log(TotalSum);

console.log(TotalSum1);


function AddArrayElement1(arrEle){

  let sum = 0;

  arrEle.forEach((c) =>{
    sum += c * 2;
  });
  return sum;
}

const AllAdd = AddArrayElement1([1, 2, 3, 4, 5, 6]);
console.log(AllAdd);


function AddArrayElement2(arrEle){

let sum = 0;

 return arrEle.reduce((accu, curr) => accu + ( curr * 2), 0)
}
