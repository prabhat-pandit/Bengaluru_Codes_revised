<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

	<div class="container mt-5 mb-5 text-center">
		<h1 class="h1">JavaScript Array Operations [Array Reverse]</h1>
	</div>


	<script>
		
		let str = "Hello World I Love React a Lot";
		let str1 = str.split(" "); // convert string into the array.
		console.log(str1);

		let reverseStr = str1.reverse();
		console.log(reverseStr);

		// reverse() method will change or Mutate the original Array as well

		let reverseArray = [3, 6, 7, 19, -2, -1, 0, 100];
		let reverseNumArr = [...reverseArray].reverse();
		console.log(reverseNumArr);
		console.log(reverseArray);

		// Reverse The String[Array]

		let strArr = "Hello Guys Please Subscribe Now";
		let str2 = strArr.split(" ").reverse();
		console.log(str2);

		let originalStr = str2.join(" ");
		console.log(originalStr);

	</script>

</body>
</html>
