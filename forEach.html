<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

	<div class="container mt-4 mb-4">
		
		<button id="one" class="btn btn-outline-info btn-sm">Button One</button>
		<button id="two" class="btn btn-outline-info btn-sm">Button Two</button>
		<button id="three" class="btn btn-outline-info btn-sm">Button Three</button>
		<button id="four" class="btn btn-outline-info btn-sm">Button Four</button>
		<button id="five" class="btn btn-outline-info btn-sm">Button Five</button>
		<button id="six" class="btn btn-outline-info btn-sm">Button Six</button>


		<button id="seven" class="btn btn-dark btn-sm">Retry Again</button>
		<div class="row justify-content-center" id="dataRender"></div>
		<div class="error" id="error"></div>

	</div>

	<script>
		
		document.addEventListener("DOMContentLoaded", function(){

           let btns = document.querySelectorAll(".btn-sm");
            btns.forEach(btn => {
             btn.addEventListener("click", function(e){
                 // alert(e.target.getAttribute("id"));

             	// const obj = {};

             	// obj.id: e.target.getAttribute("id");
             	// obj.class: e.target.getAttribute("class");

             	const buttonDetails = {
             		id: e.target.getAttribute("id"),
             		class: e.target.getAttribute("class"),
             		buttonText: e.target.innerText,
             	};

                btns.forEach(button => button.classList.remove("active"));

                this.classList.add("active");

                console.log("Button Id :" + buttonDetails.id + " | " + "Button Class : " + buttonDetails.class + " | " + "Button Text: " + buttonDetails.buttonText);
             });
            });
        
		});


        // Reversed The String array
		let str = "I Love React, Angular, Vue and ServiceNow a Lot.";
		console.log(str.replace(/[.,]/g, "").split(" "));
		console.log(str);
        console.log([...str]);

		function func1(str){

			if(!str) return "Text Not Found";

			let words = str.replace(/[.,]/g, "").split(" ");
			let newReversedArray = [];

			for (let i = words.length - 1; i >= 0; i--) {
				newReversedArray.push(words[i]);
			}

			return newReversedArray;
		};

		console.log(func1(str));


		let btn = document.querySelector("#seven");
		let errorText = document.querySelector("#error");
		let dataRender = document.querySelector("#dataRender");

		let fetchUserData = () => {
                   btn.innerText = "Loading...";
                   errorText.innerText = "";
                   btn.setAttribute("disabled", true);
			       fetch(`https://jsonplaceholder.typicode.com/users`)
			       .then(response => {
			       	if(!response.ok) {
			       		throw new Error("Network Not Working at This Moment");
			       	}
			 
			         console.log(response);
			         return response.json();

			       })
			       .then(data => {
			       	btn.innerText = "Retry Again";
			       	btn.removeAttribute("disabled");
			       	errorText.innerText = "";
			       
			       	dataRender.innerHTML = data.map(user => `
                        
                        <div class="col-lg-3 text-left col-sm-12 col-xs-12 col-md-4">
                           <div class="card mt-4 mb-4">
                             <div class="card-body">
                             <h4 class="card-title">Name: ${user.name}</h4>
			       		     <p>User Name: ${user.username}</p>
			       		     <p>E-mail: ${user.email}</p>
			       		     <p>City: ${user?.address?.city}</p>
			       		     <p>Address: ${user?.address?.street}</p>
			       		     <p>Website: ${user.website}</p>
                            </div>
			       		   </div>
                        </div>

			       	`).join("");
			       })
			       .catch((error) =>{
			      	console.log(error.message);
			      	btn.innerText = "Retry Again";
			      	btn.removeAttribute("disabled");
			      	errorText.innerText = "Something Went Wrong";
			      });



		};

		fetchUserData();

		
		    btn.addEventListener("click", ()=>{
		    	fetchUserData();
		    });

	</script>

</body>
</html>
