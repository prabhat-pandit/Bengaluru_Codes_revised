<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <div class="container mt-5 mb-5 text-center">
		<h1 class="h1">JavaScript Array Operations [Array Reverse]</h1>
	</div>



<script>
	    let str = "Hello World Js";
        let str1 = str.split(" ");
        console.log(str1);

        let str2 = str1.reverse();
        console.log(str2);


        const reversedArray = [4, 5, 7, 8, 0, 9, 1].reverse();
        console.log(reversedArray);

        // Reverse The Number Array using Filter Method
        const reversedArray1 = [4, 5, 7, 8, 0, 9, 1].filter(num => num !== undefined).reverse();
        console.log(reversedArray1);

        // Reverse The String Array using Filter Method
        const reversedString = "Hello World I Love React".split(" ").filter(str => str).reverse();
        console.log(reversedString);
        
        // 
        const reversedString1 = "Hello World I Love React"
        .split(" ")
        .reverse();
        console.log(reversedString1);


        
        function func12(str){

        	if (!str) return "No String Found";

        	let word = str.split(" "); // split the string into array

        	let newStr = [];

        	for (let i = word.length - 1; i >= 0; i--) {
        	 	newStr.push(word[i]);
        	 }

        	 return newStr; 
        }
        console.log(func12("i love react, angular and ServiceNow"));

        // input array1 = [10, 3, 20, 24, 40];
        // output [40, 24, 20, 3, 10]

        const ar = [10, 3, 20, 24, 40];
        let rever = [...ar].reverse(); // original array safe rahega spread operator se.
        console.log(ar); // reverse method original array ko change (mutate) kar deta hai.
        console.log(rever);

        function func13(ar){

        	if(ar.length === 0) return [];

        	let newArray = [];

        	for (let i = ar.length - 1; i >= 0; i--) {
        		newArray.push(ar[i]);
        	}

        	return newArray;
        };
        console.log(func13(ar));

        let num = 12345;

        let reversed = num.toString().split("").reverse().join("");

        console.log(reversed); // "54321"


        let str4 = "I love JavaScript";

        let result = str4.split(" ").reverse().join(" ");

        console.log(result);
        // "JavaScript love I"

        // Reverse Only Even Numbers using for Loop
        let array4 = [1,2,3,4,5,6];

        function func14(array4){

        	if (array4.length === 0) return 0;

        	let evenReverse = [];

        	for (let i = array4.length - 1; i >= 0; i--) {
        		if(array4[i] % 2 === 0){
        			evenReverse.push(array4[i]);
        		}
        	}
        	return evenReverse;
        };
        console.log(func14(array4));

        // Reverse Only Even Numbers using filter method
        const filtered = array4.filter(filterArray => filterArray % 2 === 0).reverse();
        console.log(filtered);


        // Reverse Only Odd Numbers using for Loop
        function func15(array4){

        	if (array4.length === 0) return 0;

        	let oddReverse = [];

        	for (let i = array4.length - 1; i >= 0; i--) {
        		if(array4[i] % 2 !== 0){
        			oddReverse.push(array4[i]);
        		}
        	}
        	return oddReverse;
        };
        console.log(func15(array4));

</script>

</body>
</html>
