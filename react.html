<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>React Overlay Menu</title>

  <!-- Bootstrap (optional for demo background) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* Hamburger */
    .hamburger {
      position: fixed;
      top: 25px;
      right: 30px;
      cursor: pointer;
      z-index: 1001;
    }

    .bar {
      width: 35px;
      height: 4px;
      background: white;
      margin: 6px 0;
      transition: 0.4s;
    }

    /* Transform into X */
    .change .bar1 {
      transform: rotate(-45deg) translate(-7px, 6px);
    }

    .change .bar2 {
      opacity: 0;
    }

    .change .bar3 {
      transform: rotate(45deg) translate(-7px, -6px);
    }

    /* Overlay */
    .overlay {
      position: fixed;
      left: 0;
      bottom: -100%;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: bottom 0.5s ease-in-out;
      z-index: 1000;
    }

    .overlay.active {
      bottom: 0;
    }

    .menu a {
      display: block;
      color: white;
      font-size: 40px;
      margin: 20px 0;
      text-decoration: none;
      text-align: center;
      transition: 0.3s;
    }

    .menu a:hover {
      color: #ccc;
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [open, setOpen] = React.useState(false);

  const toggleMenu = () => {
    setOpen(!open);
  };

  return (
    <>
      {/* Hamburger */}
      <div 
        className={open ? "hamburger change" : "hamburger"} 
        onClick={toggleMenu}
      >
        <div className="bar bar1"></div>
        <div className="bar bar2"></div>
        <div className="bar bar3"></div>
      </div>

      {/* Overlay Menu */}
      <div className={open ? "overlay active" : "overlay"}>
        <div className="menu">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Services</a>
          <a href="#">Contact</a>
          <a href="#">Dashboard</a>
          <a href="#">Login</a>
        </div>
      </div>

      {/* Dummy Content */}
      <div className="container text-center mt-5 pt-5">
        <h1>React Fullscreen Overlay Menu</h1>
        <p>Click the hamburger icon to open the menu.</p>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
