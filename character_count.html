<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Advanced Character Counter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
#percentage{
position:absolute;
top: -7px;
top: -32px;
left:0;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:4px 8px;
border-radius:5px;
font-size:14px;
white-space:nowrap;
z-index:99999 !important;
transition: all 0.3s ease;
}
.progress, .progress-stacked{
	height: 2rem !important;
	border-radius: 0px;
}
</style>

</head>
<body>

<div class="container mt-5">

<h1 class="text-center mb-4">Advanced Character and Word Counter in JavaScript</h1>

<textarea id="textInput" class="form-control" rows="5"
placeholder="Start typing here..."></textarea>

<div class="mt-3">

<p class="h4">Characters: <span id="charCount">0</span></p>

<p class="h4">Characters (without spaces): 
<span id="charWithoutSpace">0</span>
</p>

<p class="h4">Words: <span id="wordCount">0</span></p>

</div>



<div class="progress position-relative overflow-visible mt-4">

<div id="progressBar" class="progress-bar bg-success" style="width:0%"></div>

<div id="percentage">0%</div>

</div>

<p class="mt-2 text-muted h4">Limit: 200 characters</p>

</div>


<div class="container">
	<textarea id="text" class="form-control" rows="5" placeholder="Start typing here..."></textarea>
	<p>Character: <span id="characterCount">0</span></p>
	<p>Words: <span id="words">0</span></p>
</div>

    	const words = textData.trim().split(/\s+/).filter(word => word.length > 0);

<script>

const textInput = document.querySelector("#textInput");
const charCount = document.querySelector("#charCount");
const charWithoutSpace = document.querySelector("#charWithoutSpace");
const wordCount = document.querySelector("#wordCount");
const progressBar = document.querySelector("#progressBar");
const percentage = document.querySelector("#percentage");

const limit = 200;

textInput.addEventListener("input", function(){

const text = this.value;

// Character count
const characters = text.length;
charCount.innerText = characters;

// Characters without spaces
// string se saare spaces hata do
const noSpaces = text.replace(/\s/g,"").length;
charWithoutSpace.innerText = noSpaces;

// Word count
// agar word empty nahi hai toh rakho, agar empty hai toh hata do
const words = text.trim().split(/\s+/).filter(word => word.length > 0);
wordCount.innerText = words.length;

// Progress bar calculation
// (100 / 200) * 100, result = 50%,
const percent = (characters / limit) * 100; 

// Progress bar width
progressBar.style.width = Math.round(percent) + "%"; // css width: 50%, Isliye progress bar 50% fill ho jayega.

// Percentage text
percentage.innerText = Math.round(percent) + "%";

// Move percentage label
percentage.style.left = Math.round(percent) + "%";

// Color change when limit crosses
if(characters > limit){
progressBar.classList.remove("bg-success");
progressBar.classList.add("bg-danger");
}else{
progressBar.classList.remove("bg-danger");
progressBar.classList.add("bg-success");
}

});

</script>

</body>
</html>
