<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>JavaScript DOM Manipulation | HTML CSS JavaScript</title>
	 <!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<style>
	  body{
	  	background: #fff;
	  }
	 *{
	 	  padding: 0;
	 	  margin: 0;
	  }
    .card {
     transition: 0.3s;
     }
    .card:hover {
      transform: scale(1.05);
      cursor: pointer;
    }
	</style>
</head>
<body>

<div class="container">

   <div class="text-center mt-5 mb-5">
      <h1>DOM Manipulation + Event Handling in JavaScript: Beginners To Pro</h1>
   </div>

  <div id="row"></div>



  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Modal title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Modal body text goes here.</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>      

</div>

<script>


const users = [
  { id: 1, name: "Rahul", email: "rahul@gmail.com", profile:"Software Developer", },
  { id: 3, name: "Pawan", email: "pawan@gmail.com", profile:"Python Developer", },
  { id: 4, name: "Nitish", email: "nitish@gmail.com", profile:"ServiceNow Developer", },
  { id: 5, name: "Ravi", email: "ravi@gmail.com", profile:"SEO Expert", },
  { id: 6, name: "Shudhir", email: "Shudhir@gmail.com", profile:"UI Developer", },
  { id: 7, name: "Arjun", email: "arjun@gmail.com", profile:"Software Developer", },
  { id: 8, name: "Kiran", email: "kiran@gmail.com", profile:"Software Developer", },
  { id: 9, name: "Pankaj", email: "pankaj@gmail.com", profile:"MBA", },
  { id: 10, name: "Vikas", email: "vikas@gmail.com", profile:"Frontend Developer", }
];

const userLists = document.querySelector("#row");


const div = document.createElement('div');
      div.classList.add("row", "justify-content-center");
      div.id = "myId";

userLists.appendChild(div); // First Div insertion in the DON tree, very Important

console.log(div);


 users.forEach((u) =>{

  const col = document.createElement("div");  // Column creation, Second Div Creation
  col.classList.add("col-sm-3","mt-3", "mb-3");



  const card = document.createElement("div"); // Card div creation, Second Div Creation col>card
  card.classList.add("card", "bg-info");
  card.style.width="100%";

  card.innerHTML = `
                  
      <img class="card-img-top" alt="${u.name}" src="https://randomuser.me/api/portraits/men/${Math.floor(Math.random()*50)}.jpg">
      <div class="card-body">
        <h5 class="card-title">${u.name}</h5>
        <p class="card-text">${u.email}</p>
        <p class="card-text">${u.profile}</p>
        <a href="javascript:void(0)" class="btn btn-primary btn-click">Know More</a>
        <button class="btn btn-like">❤️</button>
        <button class="btn btn-warning btn-delete">Delete</button>
      </div>
              
    `;


  // 🔥 yahan object direct pass ho raha hai
  card.querySelector(".btn-click").addEventListener("click", (e) => {
    e.stopPropagation(); // 🔥 important
    ShowName(u);
    // alert(`Hello ${u.name}`);
  });

  card.querySelector(".btn-like").addEventListener("click", (e) => {
  e.stopPropagation();
  e.target.classList.toggle("btn-danger");
  });

  card.querySelector(".btn-delete").addEventListener("click", function(e){
    e.stopPropagation() // Event DOM tree me upar (parent elements) tak bubble nahi karega
    col.remove();
  });

  

  col.appendChild(card); // Card ko "Column card" ke andar daalo. column div>Card div
  div.appendChild(col); // Ab last mein "Column Card ya Div" ko main Div ke andar daal do bas. simple

 });



// function ShowName(u){
//   alert(`Hello ${u.name}`);
// };

function ShowName(u){
  document.querySelector(".modal-title").innerText = u.name;
  document.querySelector(".modal-body").innerHTML = `
    <p>Email: ${u.email}</p>
    <p>Profile: ${u.profile}</p>
  `;

  const modal = new bootstrap.Modal(document.getElementById('userModal'));
  modal.show();
}


</script>


<!-- So guys, if you JavaScript Knowledge is strong and robust then guys you will be abale to understand and grasp ReactJs, AngularJs and VueJs very easily and efficiently. "Yeh Bolna hai mujhe introduction mein video mein" -->


</body>
</html>
