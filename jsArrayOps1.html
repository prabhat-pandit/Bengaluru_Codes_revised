<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

	<div class="container mt-4 mb-4 text-center">
		<h1 class="h1">JavaScript Array Operations [Array Reverse]</h1>
	</div>


	<script>
		
		let str = "Hello World I Love React";
		let str1 = str.split(" "); // split(" ") is used to create array from any string
		console.log(str1);

		const reverseStr = str1.reverse(); // it used to reverse the array or string
		console.log(reverseStr);

		// reverse() method will change (Mutate) the original Array or String as well.

		let numArr = [3, 5, 6, 8, 9, -2, -1, 0, 10];
		let reverseNum = numArr.reverse();
		console.log(reverseNum);
		console.log([...numArr].reverse());


	</script>

</body>
</html>
