<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .avatar{
		 width:50px;
		 height:50px;
		 border-radius:50%;
		 background:#333;
		 color:white;
		 display:flex;
		 align-items:center;
		 justify-content:center;
		 font-weight:bold;
		 margin: 0 auto;
		}
    </style>
</head>
<body>


 <div class="container mt-5 mb-5">

 	<div class="mt-5 mb-5 text-center">
 		<h1>Create Dynamic User Avatar with Initials in JavaScript</h1>
 	</div>

 	<div id="avatar" class="avatars row"></div>
 </div>

<script>
	
 const getInitialFromName = name => {
    
 const initials = name.split(" ")
        .map(word => word[0].toUpperCase())
        .join("");

 return initials;

}

const capitalize = name => {
	const bigName =  name.split(" ")
	                 .map(word => word[0].toUpperCase() + word.slice(1)).join(" ");
	      return bigName;
};

const name = ["prabhat pandit", "pooja kumari jha", "deepak sharma", "riya yadav"]


document.querySelector("#avatar").innerHTML = name.map(name => `
  
  <div class="user col-lg-3 text-center">
     <div class="avatar">${getInitialFromName(name)}</div>
     <p class="h4">${capitalize(name)}</p>
  </div>

`).join("");

</script>

</html>
