<html>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<!-- Bootstrap (optional for demo background) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

	<div class="container mt-5 mb-5">
		
		<h1 class="h1 mt-5 mb-5 text-center">Build a Dynamic Product Page Using JavaScript</h1>

	   	<h2 class="mb-4">Search Products by Name & Brand</h2>

	   	<div class="input-group">
	   		<input type="search" placeholder="Search Your Products Here..." class="form-control" id="searchInput">
	   	</div>

	   	<div id="products" class="row justify-content-center mt-5 mb-5"></div>

	</div>

	<script>
		
		// array of objects
		const products = [

		{

		{

		rating:4.7,

		},

		{
		id:5,

		},

		{
		id:6,
		name:"Men's Casual T-Shirt",
		price:799,
		discounted_price:500,
		brand:"Puma",
		rating:4.1,
		image:"https://m.media-amazon.com/images/I/713n+TxyfCL._SX569_.jpg"
		},

		{
		id:7,
		name:"Laptop Backpack",
		price:1499,
		discounted_price:1100,
		brand:"Skybags",

		},

		{
		id:8,

		price:1799,

		rating:4.5,

		{
		id:9,

		price:599,

		},

		{
		id:10,
		name:"LED Desk Lamp",

		discounted_price:500,
		brand:"Philips",

		image:"https://m.media-amazon.com/images/I/61dmqocm9qL._SL1280_.jpg"
		},
		{
		id:11,
		name:"External SSD 1TB",
		price:7999,
		discounted_price:2000,
		brand:"Samsung",
		rating:4.3,
		image:"https://m.media-amazon.com/images/I/81RiwhBz2DL._SX679_.jpg"
		},

		{
		id:12,
		name:"Wireless Gaming Controller",
		price:2599,
		discounted_price:2000,
		brand:"Xbox",
		rating:4.3,
		image:"https://m.media-amazon.com/images/I/51r0ELMxhtL.jpg"
		},

   ];

   const container = document.querySelector("#products");

   const displayProducts = data => {

   	if(data.length === 0){
   		container.innerHTML = `
           <div class="col-12 text-center mt-5">

            <img src="https://cdn-icons-png.flaticon.com/512/2748/2748558.png" width="90">
            <h3 class="text-center text-muted">No Product Found</h3>
            <p>Try Searching Another Product or Keyword...</p>
           </div>
   		`;
   		return;
   	}

   	container.innerHTML = data.map(product => `

   		<div class="col-lg-3 col-md-3 col-sm-6 mb-4">
             <div class="card h-100 shadow-lg">

                <img src="${product.image}" class="card-img-top product-img">

   		        <div class="card-body">
   		          <h5 class="card-title">${product.name}</h5>
   		          <p class="text-muted">${product.brand}</p>
   		          <p class="text-muted">⭐ ${product.rating}</p>
   		          <h6 class="text-primary text-stroke">₹ ${product.price}</h6>
   		          <h6 class="text-muted">Discounted Price: ₹ ${product.discounted_price}</h6>

   		          <button class="btn btn-dark w-100">Add To Cart</button>
   		        </div>

             </div>
   		</div>
   	`).join("");

   };

   displayProducts(products);

   const searchInput = document.querySelector("#searchInput");

   searchInput.addEventListener("input", function(){

     const searchValue = this.value.toLowerCase();

     console.log(searchValue);

     const filterProducts = products.filter(product => product.name.toLowerCase().includes(searchValue) || product.brand.toLowerCase().includes(searchValue) || product.price.toString().includes(searchValue));

     displayProducts(filterProducts);

   });

	</script>

</body>
</html>
