<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Code With Er. Prabhat Pandit</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
	#percentage{
		position:absolute;
		top: -7px;
		top: -32px;
		left:0;
		transform:translateX(-50%);
		background:#000;
		color:#fff;
		padding:4px 8px;
		border-radius:5px;
		font-size:14px;
		white-space:nowrap;
		z-index:99999 !important;
		transition: all 0.3s ease;
		}
		.progress, .progress-stacked{
			height: 2rem !important;
			border-radius: 0px;
		}
	</style>
</head>
<body>

	<div class="container mt-4 mb-4">
		
		<div class="text-center mt-2 mb-2">
			<h1 class="text-center mb-4">Advanced Character and Word Counter App in JavaScript</h1>
		</div>

		<textarea class="form-control" id="textInput" rows="5" placeholder="Type Your Text Here...."></textarea>

		<div class="mt-4 mb-4">
			<p class="h4">
				Characters Counts: <span id="charCount">0</span>
			</p>
			<p class="h4">
				Characters Counts (Without Spaces): <span id="charCountwithoutSpaces">0</span>
			</p>
			<p class="h4">
				Words Counts: <span id="wordCount">0</span>
			</p>
		</div>

		<div class="progress position-relative overflow-visible mt-4" id="progress">
			<div id="progressBar" class="progress-bar bg-success" style="width:0%"></div>
			<div id="percentage">0%</div>
		</div>

		<div class="mt-4 mb-4">
			<p class="h4 text-muted">
				Limit: <span id="limit">200 Characters</span>
			</p>
			<p class="h4 text-muted">
				Remaining: <span id="ramaining">200</span> Characters
			</p>
		</div>

	</div>

	<script>
		
		const textInput = document.querySelector("#textInput");
		const charCount = document.querySelector("#charCount");
		const charCountwithoutSpaces = document.querySelector("#charCountwithoutSpaces");
		const wordCount = document.querySelector("#wordCount");
		const progress = document.querySelector("#progress");
		const progressBar = document.querySelector("#progressBar");
		const percentage = document.querySelector("#percentage");
		const ramaining = document.querySelector("#ramaining");

		const limit = 200;

		textInput.addEventListener("input", function(){

			const text = this.value;
			console.log(text);

			const characters = text.length;
			console.log(characters);

			charCount.innerText = characters;

			const noSpaces = text.replace(/\s/g, "").length;
			charCountwithoutSpaces.innerText = noSpaces;

			const words = text.trim().split(/\s+/).filter(word => word.length > 0);

			wordCount.innerText = words.length;

            // (100/200) * 100; result 50%
			const percent = (characters / limit) * 100;

			progressBar.style.width = Math.round(percent) + "%";

			percentage.innerText = Math.round(percent) + "%";

			percentage.style.left = Math.round(percent) + "%";


			const remain = (limit - characters); // 200 - 239, remain: -0,
			ramaining.innerText = remain;

			if(remain < 0){
				ramaining.style.color = "red";
			}
			else{
				ramaining.style.color = "inherit";
			}

            if(characters > limit){
            	progressBar.classList.remove("bg-success");
            	progressBar.classList.add("bg-danger");
            }
            else{
            	progressBar.classList.add("bg-success");
            	progressBar.classList.remove("bg-danger");
            }

		});

	</script>


	<script>
		
		const arr = [2, 4, 5, 6, 17, 10, 3, 90, 0, -1];
        

        // Double the every element in an array
		function doubleTheArray(arr){

			// Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

			let arrVar = [];

			for (var i = 0; i < arr.length; i++) {
			arrVar.push(arr[i] * 2);
		}
		return arrVar;
		}
		console.log(doubleTheArray([...arr]));


        // find the max element in an array
		function maxElementofArray(arr){

			// Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

            let max = arr[0]; // pehla element ko maximum value maan liya

			for (let i = 1; i < arr.length; i++) {
				if(arr[i] > max){
				max = arr[i];
			}			
			}
			return max;
		};
		console.log(maxElementofArray(arr));

		// find the min element in an array
		function minElementofArray(arr){
 
            // Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

            let min = arr[0]; // pehla element ko minimum value maan liya

			for (let i = 1; i < arr.length; i++) {
				if(arr[i] < min){
				min = arr[i];
			}			
			}
			return min;
		};
		console.log(minElementofArray(arr));


		// find the Sum of the element in an array
		function sumElementOfArray(arr){
 
            // Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

            let sum = 0;

			for (let i = 0; i < arr.length; i++) {
				sum += arr[i];			
			}
			return sum;
		};
		console.log(sumElementOfArray(arr));

        // find the Sum of the even elements in an array
		function AddTheEvenElementOfTheArray(arr){

			// Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

			let evenSum = 0;

			for (var i = 0; i < arr.length; i++) {
				if(arr[i] % 2 === 0){
                 evenSum += arr[i];
				}
			}
            return evenSum;
		}
        console.log(AddTheEvenElementOfTheArray(arr));

        // find the Sum of the odd elements in an array
		function AddTheOddElementOfTheArray(arr){

			// Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

			let oddSum = 0;

			for (var i = 0; i < arr.length; i++) {
				if(arr[i] % 2 !== 0){
                 oddSum += arr[i];
				}
			}
            return oddSum;
		}
        console.log(AddTheOddElementOfTheArray(arr));

        // Show or create an array of all the even elements in an array
		function evenArray(arr){

			// Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

			let evenArray = [];

			for (var i = 0; i < arr.length; i++) {
				if(arr[i] % 2 === 0){
                 evenArray.push(arr[i]);
				}
			}
            return evenArray;
		}
        console.log(evenArray(arr));

        // Show or create an array of all the odd elements in an array
		function oddArray(arr){

			// Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr.length === 0) return "Array is empty";

			let oddArray = [];

			for (var i = 0; i < arr.length; i++) {
				if(arr[i] % 2 !== 0){
                 oddArray.push(arr[i]);
				}
			}
            return oddArray;
		}
        console.log(oddArray(arr));


        const arr1 = [2, 3, 3, 3, 2, 4, 7, 10, -2, 0, -2, -1, 4];
        // Remove Duplicate Values from Array
		function uniqueArray(arr1){

			// Agar array empty ho toh error aa sakta hai. Safe version:
			if(arr1.length === 0) return "Array is empty";

			let uniqueArray = [];

			for (var i = 0; i < arr1.length; i++) {
				if(!uniqueArray.includes(arr1[i])){
                   uniqueArray.push(arr1[i]);
				}
			}
            return uniqueArray;
		}
        console.log(uniqueArray(arr1));

       // Count how many even numbers in an array
       const arr3 = [2,3,4,6,7,9];

       function CountEvenNumbers(arr3){
          
       	// Agar array empty ho toh error aa sakta hai. Safe version:
		if(arr3.length === 0) return 0;

        let evenNumbers = [];

        for (let i = 0; i < arr3.length; i++) {
        	if(arr3[i] % 2 === 0){
        		evenNumbers.push(arr3[i]);
        	}
        }
        return (evenNumbers.length);
       };
       console.log(CountEvenNumbers(arr3));

       // Count how many odd numbers in an array
       const arr4 = [2, 3, 4, 6, 7, 9, 3, 1];

       function CountOddNumbers(arr4){
          
       	// Agar array empty ho toh error aa sakta hai. Safe version:
		if(arr4.length === 0) return 0;

        let oddNumbers = [];

        for (let i = 0; i < arr4.length; i++) {
        	if(arr4[i] % 2 !== 0){
        		oddNumbers.push(arr4[i]);
        	}
        }
        return (oddNumbers.length);
       };
       console.log(CountOddNumbers(arr4));
	</script>
